# Overrides CustomStartingLocation when enabled.
# Default: True
FactionStartingLocations = True

# Starting location for LIGHT faction (Human Village / Talking Island).
# Default: -71338, 258271, -3104
FactionLightLocX = -84124
FactionLightLocY = 244623
FactionLightLocZ = -3729

# Starting location for DARK faction (Kamael Village).
# Default: -125550, 38200, 1152
FactionDarkLocX = 43272
