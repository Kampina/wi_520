<html noscrollbar>
<title>Fortune box: %name%</title>
<body>
	<table border=0 cellpadding=0 cellspacing=0 width=292 height=358 background="l2ui_ct1.Windows_DF_TooltipBG">
		<tr>
			<td valign="top">
				<table width=290 align="center">
					<tr>
						<td valign=top align=center height=32>
							<table border=0 width=284 height=55 cellspacing=1 cellpadding=0 background="l2ui_ct1.ComboBox_DF_Dropmenu_Bg">
								<tr>
									<td valign=top align=center>
										<table width=284 height=22 cellspacing=1 cellpadding=1 bgcolor=111111>
											<tr>
												<td width=284 align=center valign=center>
													<font color=B59A75>Game price:</font> %price%
												</td>
											</tr>
										</table>
									</td>
								</tr>
								<tr>
									<td valign=top align=center>
										<table width=284 height=33 cellspacing=1 cellpadding=1 bgcolor=666666>
											<tr>
												<td width=142 height=30 align=right valign=top>
													<table width=90 height=28 background="l2ui_ct1.Windows_DF_TooltipBG">
														<tr>
															<td width=88 height=26 align=center valign=top>
																<button value="PLAY" action="bypass -h htmbypass_fortune.play %id%" width=86 height=24 back="L2UI_CT1.ListCTRL_DF_Title_Down" fore="L2UI_CT1.ListCTRL_DF_Title">
															</td>
														</tr>
													</table>
												</td>
												<td width=143 height=30 align=left valign=top>
													<table width=90 height=28 background="l2ui_ct1.Windows_DF_TooltipBG">
														<tr>
															<td width=88 height=26 align=center valign=top>
																<button value="BACK" action="bypass -h htmbypass_fortune.index 1" width=86 height=24 back="L2UI_CT1.ListCTRL_DF_Title_Down" fore="L2UI_CT1.ListCTRL_DF_Title">
															</td>
														</tr>
													</table>
												</td>
											</tr>
										</table>
									</td>
								</tr>
							</table>
						</td>
					</tr>
					<tr>
						<td valign="top" align="center">
							<table width=270 height=35>
									%list%
							</table>
						</td>
					</tr>
					<tr>
						<td align="center" valign="top">
							<table border=0 width=270>
								<tr>
									%navigation%
								</tr>
							</table>
						</td>
					</tr>
				</table>
			</td>
		</tr>
	</table>
</body>
</html>
