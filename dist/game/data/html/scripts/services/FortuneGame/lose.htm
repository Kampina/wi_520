<html noscrollbar>
<title>Fortune box: You lose</title>
<body>
	<table border=0 cellpadding=0 cellspacing=0 width=292 height=358 background="l2ui_ct1.Windows_DF_TooltipBG">
		<tr>
			<td valign="top">
				<table align="center">
					<tr>
						<td valign="top" align="center"><br>
							<table width=270 height=35>
								<tr>
									<td width=270 height=50 align=center valign=top>
										<font color="FF3333" name="hs15">Lose</font><br>
									</td>
								</tr>
							</table>
							<table width=270 height=35>
								<tr>
									<td width=270 height=50 align=center valign=top>
										<table border=0 cellspacing=2 cellpadding=4 width=282 height=44 bgcolor="333333">
											<tr>
												<td width=260 align=center valign=top>
													<font color="CC3333">Unfortunately you lose</font>
													<br1><font color="FF6600">Try again maybe you are lucky the next time</font>
												</td>
											</tr>
										</table>
									</td>
								</tr>
							</table><br>
							<table width=270 height=35>
								<tr>
									<td width=94 height=30 align=center valign=top>
										<table width=90 height=28 background="l2ui_ct1.Windows_DF_TooltipBG">
											<tr>
												<td width=88 height=26 align=center valign=top>
													<button value="PLAY AGAIN" action="bypass -h htmbypass_fortune.play %id%" width=86 height=24 back="L2UI_CT1.ListCTRL_DF_Title_Down" fore="L2UI_CT1.ListCTRL_DF_Title">
												</td>
											</tr>
										</table>
									</td>

												<td width=88 height=26 align=center valign=top>
													<button value="REWARD LIST" action="bypass -h htmbypass_fortune.box.page %id% 1" width=86 height=24 back="L2UI_CT1.ListCTRL_DF_Title_Down" fore="L2UI_CT1.ListCTRL_DF_Title">
												</td>
											</tr>
										</table>
									</td>
								</tr>
							</table><br>
							<table width=90 height=28 background="l2ui_ct1.Windows_DF_TooltipBG">
								<tr>
									<td width=88 height=26 align=center valign=top>
										<button value="MAIN" action="bypass -h htmbypass_fortune.index 1" width=86 height=24 back="L2UI_CT1.ListCTRL_DF_Title_Down" fore="L2UI_CT1.ListCTRL_DF_Title">
									</td>
								</tr>
							</table>
						</td>
					</tr>
				</table>
			</td>
		</tr>
	</table>
