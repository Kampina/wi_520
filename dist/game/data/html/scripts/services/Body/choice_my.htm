<html>
<head>
<body scroll="no">
<title>Changing the appearance of the armor</title>
<table border=0 cellpadding=0 cellspacing=0 width=292 height=358 background="l2ui_ct1.Windows_DF_TooltipBG">
	<tr>
		<td valign="top">
			<table width=290 height=330>
					<tr>
						<td valign="top" align="center">
							<br><font color="66CC00">Select item type</font><br>
							<table width=270 height=100>
								<tr>
									<td width=270 height=50 align=center valign=top>
										<table border=0 cellspacing=2 cellpadding=4 width=270 height=50>
											<tr>
												<td FIXWIDTH=40 align=right valign=top>
													<table border=0 cellspacing=0 cellpadding=0 width=32 height=32 background="icon.weapon_ysandy_crusher_i01">
														<tr>
															<td width=32 align=center valign=top>
																<img src="icon.panel_2" width="32" height="32">
															</td>
														</tr>
													</table>
												</td>
												<td FIXWIDTH=210 align=left valign=top>
													<font color="CC3333">Weapon</font>
													<br1>› <font color=339933>Cost:</font> {weapon}.
												</td>
												<td valign="top" align="center">
													<br>
													<button action="bypass -h htmbypass_services.Body.Peace:mylist weapon" width="15" height="15" back="L2UI_CT1.Button_DF_Input_Down" fore="L2UI_CT1.Button_DF_Input">
												</td>
											</tr>
										</table>
									</td>
								</tr>
								<tr>
									<td width=270 height=50 align=center valign=top>
										<table border=0 cellspacing=2 cellpadding=4 width=270 height=50>
											<tr>
												<td FIXWIDTH=40 align=right valign=top>
													<table border=0 cellspacing=0 cellpadding=0 width=32 height=32 background="icon.armor_t94_u_i03">
														<tr>
															<td width=32 align=center valign=top>
																<img src="icon.panel_2" width="32" height="32">
															</td>
														</tr>
													</table>
												</td>
												<td FIXWIDTH=210 align=left valign=top>
													<font color="CC3333">Armor</font>
													<br1>› <font color=339933>Cost:</font> {armor}.
												</td>
												<td valign="top" align="center">
													<br>
													<button action="bypass -h htmbypass_services.Body.Peace:page choice_my_armor" width="15" height="15" back="L2UI_CT1.Button_DF_Input_Down" fore="L2UI_CT1.Button_DF_Input">
												</td>
											</tr>
										</table>
									</td>
								</tr>
								<tr>
									<td width=270 height=50 align=center valign=top>
										<table border=0 cellspacing=2 cellpadding=4 width=270 height=50>
											<tr>
												<td FIXWIDTH=40 align=right valign=top>
													<table border=0 cellspacing=0 cellpadding=0 width=32 height=32 background="icon.feud_lord_cloak_i00">
														<tr>
															<td width=32 align=center valign=top>
																<img src="icon.panel_2" width="32" height="32">
															</td>
														</tr>
													</table>
												</td>
												<td FIXWIDTH=210 align=left valign=top>
													<font color="CC3333">Cloak</font>
													<br1>› <font color=339933>Cost:</font> {armor}.
												</td>
												<td valign="top" align="center">
													<br>
													<button action="bypass -h htmbypass_services.Body.Peace:mylist cloak" width="15" height="15" back="L2UI_CT1.Button_DF_Input_Down" fore="L2UI_CT1.Button_DF_Input">
												</td>
											</tr>
										</table>
									</td>
								</tr>
								<tr>
									<td width=270 height=50 align=center valign=top>
										<table border=0 cellspacing=2 cellpadding=4 width=270 height=50>
											<tr>
												<td FIXWIDTH=40 align=right valign=top>
													<table border=0 cellspacing=0 cellpadding=0 width=32 height=32 background="icon.evilgate_shield_i01">
														<tr>
															<td width=32 align=center valign=top>
																<img src="icon.panel_2" width="32" height="32">
															</td>
														</tr>
													</table>
												</td>
												<td FIXWIDTH=210 align=left valign=top>
													<font color="CC3333">Shield\Sigil</font>
													<br1>› <font color=339933>Cost:</font> {armor}.
												</td>
												<td valign="top" align="center">
													<br>
													<button action="bypass -h htmbypass_services.Body.Peace:mylist shield" width="15" height="15" back="L2UI_CT1.Button_DF_Input_Down" fore="L2UI_CT1.Button_DF_Input">
												</td>
											</tr>
										</table>
									</td>
								</tr>
							</table>
						</td>
					</tr>
			</table>
			<table border=0 width=290>
				<tr>
					<td width=290 align=center valign=top>
						<font color="FFFF00">Powered by L2CCCP</font>
					</td>
				</tr>
			</table>
		</td>
	</tr>
</table>
</body>
</html>
