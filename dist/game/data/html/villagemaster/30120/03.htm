!Elven Elder могут использовать магию лечения и манию поддержки.

Elders не склонны к одному навыку как Bishops или Prophets...

Чтобы стать Elder, ваш уровень должен быть не меньше 40 и вы должны иметь марки: Mark of Pilgrim, Mark of Life и Mark of Healer.
