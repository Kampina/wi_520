*Gladiator* превосходные бойцы 1 на 1, в отличии от *Warlord*.

Он несёт два меча и не носит тяжелую броню.

Чтобы стать *Gladiator*, ваш уровень должен быть не меньше 40 и вы должны собрать значки: *Mark of Challenger*, *Mark of Trust* и *Mark of Duelist*.
