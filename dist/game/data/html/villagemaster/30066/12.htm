!Гранд Мастер Рамос:

В отличие от Воинов, которые в основном атакуют,
Рыцари балансируют между атакой и защитой.
Что еще более важно, они ставят честь выше всего остального.
Чтобы стать Рыцарем, ты должен быть по меньшей мере 20 уровня,
а также должен пройти испытание Рыцаря.
