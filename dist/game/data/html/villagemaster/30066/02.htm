!Гранд Мастер Рамос:

Эльфийский Рыцарь (Elven Knight) выбирает путь меча.
Это превосходная профессия. Для того, чтобы стать Эльфийским Рыцарем
тебе необходимо набрать по крайней мере 20 уровень, кроме того ты должен
пройти испытание Эльфийского Рыцаря.
